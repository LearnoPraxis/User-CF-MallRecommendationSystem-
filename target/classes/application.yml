server:
  port: 8080

spring:
  application:
    name: mall-recommendation-system
  
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/mall_recommendation?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
  
  # Redis配置
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0
    lettuce:
      pool:
        max-active: 8
        max-wait: -1
        max-idle: 8
        min-idle: 0

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

# 文件上传路径配置（使用绝对路径）
file:
  upload-path: D:/uploads/mall
  access-url: http://localhost:8080/uploads

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.mall.entity
  configuration:
    map-underscore-to-camel-case: true
    # log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 注释掉SQL日志
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  secret: MallRecommendationSystemSecretKey2026
  expiration: 86400000  # 24小时

# Python推荐服务配置
recommend:
  python-service-url: http://localhost:5000
  use-python-service: true  # 是否使用Python服务，false则使用Java实现

# Swagger配置
springfox:
  documentation:
    swagger-ui:
      enabled: true

# 日志配置
logging:
  level:
    com.mall: debug
